<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" font-family="Poppins,Microsoft YaHei,sans-serif" font-size="13">
  <defs>
    <marker id="arr-http" viewBox="0 0 10 7" markerWidth="10" markerHeight="7" refX="8.5" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0,10 3.5,0 7" fill="#f76d37"/>
    </marker>
    <marker id="arr-sql" viewBox="0 0 10 7" markerWidth="10" markerHeight="7" refX="8.5" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0,10 3.5,0 7" fill="#2563eb"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 7" markerWidth="10" markerHeight="7" refX="8.5" refY="3.5" orient="auto" markerUnits="userSpaceOnUse" overflow="visible">
      <polygon points="0 0,10 3.5,0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>

  <text x="430" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#252525">图 1 · 系统总体架构</text>

  <!-- Browser -->
  <rect x="270" y="50" width="320" height="56" rx="8" fill="#fff4ee" stroke="#f76d37" stroke-width="2" filter="url(#shadow)"/>
  <text x="430" y="74" text-anchor="middle" font-weight="bold" fill="#f76d37">浏览器 (Browser)</text>
  <text x="430" y="94" text-anchor="middle" font-size="11" fill="#d85521">HTML5 · CSS3 · JavaScript · ECharts 5.5</text>

  <!-- Nginx -->
  <line x1="430" y1="106" x2="430" y2="142" stroke="#f76d37" stroke-width="1.8" marker-end="url(#arr-http)"/>
  <text x="442" y="128" font-size="10" fill="#f76d37">HTTP :80</text>

  <rect x="270" y="145" width="320" height="56" rx="8" fill="#fff" stroke="#252525" stroke-width="2" filter="url(#shadow)"/>
  <text x="430" y="169" text-anchor="middle" font-weight="bold" fill="#252525">Nginx (反向代理)</text>
  <text x="430" y="189" text-anchor="middle" font-size="11" fill="#6f6f6f">静态文件分发 · API 代理转发 · 负载均衡</text>

  <!-- Split: static / API -->
  <line x1="320" y1="201" x2="220" y2="240" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arr-gray)"/>
  <text x="230" y="220" font-size="10" fill="#6b7280">/</text>

  <line x1="430" y1="201" x2="430" y2="240" stroke="#f76d37" stroke-width="1.8" marker-end="url(#arr-http)"/>
  <text x="442" y="225" font-size="10" fill="#f76d37">/api/*</text>

  <!-- Static files -->
  <rect x="110" y="245" width="220" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="267" text-anchor="middle" font-weight="bold" fill="#14532d">静态文件服务</text>
  <text x="220" y="285" text-anchor="middle" font-size="11" fill="#15803d">index.html · CSS · JS · Images</text>

  <!-- Flask + Gunicorn -->
  <rect x="290" y="245" width="280" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="267" text-anchor="middle" font-weight="bold" fill="#4c1d95">Gunicorn + Flask</text>
  <text x="430" y="285" text-anchor="middle" font-size="11" fill="#5b21b6">JWT 认证 · RESTful API · ML 模型服务</text>

  <!-- Flask → MySQL -->
  <line x1="430" y1="297" x2="430" y2="340" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-sql)"/>
  <text x="442" y="320" font-size="9" fill="#2563eb">SQLAlchemy</text>

  <rect x="290" y="345" width="280" height="52" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="367" text-anchor="middle" font-weight="bold" fill="#1e3a8a">MySQL 8.0</text>
  <text x="430" y="385" text-anchor="middle" font-size="11" fill="#1e40af">users · coffees · predictions</text>

  <!-- ML models -->
  <path d="M 570 271 C 660 271, 700 300, 700 380 L 700 410 Q 700 440, 660 440 L 580 440" fill="none" stroke="#ca8a04" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr-gold)"/>

  <rect x="600" y="400" width="240" height="52" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="720" y="422" text-anchor="middle" font-weight="bold" fill="#92400e">ML 模型存储</text>
  <text x="720" y="440" text-anchor="middle" font-size="11" fill="#78350f">RF · XGBoost · LightGBM · GBDT (.pkl)</text>

  <!-- Docker box -->
  <rect x="80" y="60" width="28" height="430" rx="6" fill="none" stroke="#9ca3af" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="175" y="56" text-anchor="middle" font-size="11" font-weight="bold" fill="#6b7280" letter-spacing="2">DOCKER COMPOSE</text>

  <!-- Legend -->
  <rect x="80" y="472" width="700" height="32" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <line x1="100" y1="488" x2="140" y2="488" stroke="#f76d37" stroke-width="1.3" marker-end="url(#arr-http)"/>
  <text x="148" y="492" font-size="10" fill="#374151">HTTP 请求</text>
  <line x1="260" y1="488" x2="300" y2="488" stroke="#2563eb" stroke-width="1.3" marker-end="url(#arr-sql)"/>
  <text x="308" y="492" font-size="10" fill="#374151">SQL 查询</text>
  <line x1="420" y1="488" x2="460" y2="488" stroke="#ca8a04" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr-gold)"/>
  <text x="468" y="492" font-size="10" fill="#374151">文件加载</text>
  <text x="580" y="492" font-size="10" fill="#6b7280">灰色虚线 = Docker 容器边界</text>
</svg>
