version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: coffee-mysql
    environment:
      MYSQL_ROOT_PASSWORD: coffee123
      MYSQL_DATABASE: coffee_quality_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./coffee_quality.sql:/docker-entrypoint-initdb.d/01_init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pcoffee123"]
      interval: 5s
      timeout: 5s
      retries: 10

  flask:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: coffee-flask
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: coffee123
      MYSQL_DB: coffee_quality_db
      JWT_SECRET_KEY: coffee-quality-jwt-secret-2026
    volumes:
      - ./backend/ml/models:/app/backend/ml/models
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: coffee-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask

volumes:
  mysql_data:
