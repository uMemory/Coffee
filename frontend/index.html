<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球咖啡品质评级系统</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav id="navbar" class="navbar">
        <div class="nav-brand">
            <span class="nav-logo">CQ</span>
            <span>
                <span class="nav-title">全球咖啡品质评级系统</span>
                <span class="nav-subtitle">Coffee Quality Intelligence</span>
            </span>
        </div>
        <div id="nav-links" class="nav-links">
            <a href="#dashboard" class="nav-link">数据概览</a>
            <a href="#data" class="nav-link">数据浏览</a>
            <a href="#analysis" class="nav-link">数据分析</a>
            <a href="#predict" class="nav-link">模型预测</a>
            <a href="#history" class="nav-link">预测历史</a>
        </div>
        <div class="nav-user">
            <span class="nav-user-label">当前用户</span>
            <span id="nav-username" class="nav-username"></span>
            <button id="btn-logout" class="btn btn-sm btn-outline">退出</button>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main id="app-content" class="app-content">

    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>云计算期末大作业 &copy; 2026 | 全球咖啡品质评级系统</p>
    </footer>

    <!-- 模态框容器 -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div id="modal-content" class="modal-content"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/datatable.js"></script>
    <script src="js/analysis.js"></script>
    <script src="js/model-test.js"></script>
    <script src="js/history.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
