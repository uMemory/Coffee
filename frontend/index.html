<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球咖啡品质评级系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav id="navbar" class="navbar">
        <div class="nav-brand">
            <span class="nav-logo"><img src="images/logo.png" alt="Grand Coffee"></span>
            <span>
                <span class="nav-title">全球咖啡品质评级系统</span>
                <span class="nav-subtitle">Coffee Quality Analytics</span>
            </span>
        </div>
        <div id="nav-links" class="nav-links">
            <a href="#dashboard" class="nav-link active">数据概览</a>
            <a href="#data" class="nav-link">数据浏览</a>
            <a href="#analysis" class="nav-link">数据分析</a>
            <a href="#predict" class="nav-link">模型预测</a>
            <a href="#models" class="nav-link">模型对比</a>
            <a href="#history" class="nav-link">预测历史</a>
        </div>
        <div class="nav-user">
            <div class="nav-avatar" id="nav-avatar">?</div>
            <div class="nav-user-info">
                <div class="nav-username" id="nav-username"></div>
            </div>
            <button id="btn-logout" class="btn btn-sm btn-outline">退出</button>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main id="app-content" class="app-content"></main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>云计算期末大作业 &copy; 2026 | 全球咖啡品质评级系统</p>
    </footer>

    <!-- 模态框 -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div id="modal-content" class="modal-content"></div>
    </div>

    <!-- Toast 通知容器 -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/echarts-theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/datatable.js"></script>
    <script src="js/analysis.js"></script>
    <script src="js/model-test.js"></script>
    <script src="js/model-compare.js"></script>
    <script src="js/history.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
